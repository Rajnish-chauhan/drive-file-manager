spring.application.name=Drive

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# File Storage Path
file.upload-dir=uploads/

# Max file size per request (CRITICAL FOR LARGE UPLOADS)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# OAuth2 Google & GitHub
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.redirect-uri=https://drive-file-manager.onrender.com/login/oauth2/code/google
spring.security.oauth2.client.registration.github.redirect-uri=https://drive-file-manager.onrender.com/login/oauth2/code/github

# Reverse Proxy headers for Render
server.forward-headers-strategy=framework

# Allow cookies to be sent cross-origin (CRITICAL FOR AUTHENTICATION)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# Google Drive Refresh Token
google.client.id=${GOOGLE_CLIENT_ID_REFRESH}
google.client.secret=${GOOGLE_CLIENT_SECRET_REFRESH}
google.refresh.token=${GOOGLE_REFRESH_TOKEN}
google.drive.folder.id=${GOOGLE_DRIVE_FOLDER_URL}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_APP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true